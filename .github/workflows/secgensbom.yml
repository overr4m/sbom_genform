name: SecGenSBOM

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

env:
  IMAGE_NAME: secgensbom-sca

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry (if configured)
        if: ${{ env.DOCKER_REGISTRY != '' && secrets.DOCKER_PASSWORD != '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build secgensbom image
        run: |
          docker build \
            -t $IMAGE_NAME:${{ github.sha }} \
            -f docker/Dockerfile.secgensbom .

      - name: Tag & push to registry
        if: ${{ env.DOCKER_REGISTRY != '' && secrets.DOCKER_PASSWORD != '' }}
        run: |
          FULL_TAG=${{ env.DOCKER_REGISTRY }}/${{ github.repository_owner }}/$IMAGE_NAME:${{ github.sha }}
          docker tag $IMAGE_NAME:${{ github.sha }} $FULL_TAG
          docker push $FULL_TAG

      - name: Save image as artifact (no registry)
        if: ${{ env.DOCKER_REGISTRY == '' || secrets.DOCKER_PASSWORD == '' }}
        run: |
          docker save $IMAGE_NAME:${{ github.sha }} -o secgensbom-sca.tar

      - name: Upload image artifact
        if: ${{ env.DOCKER_REGISTRY == '' || secrets.DOCKER_PASSWORD == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: secgensbom-sca-image
          path: secgensbom-sca.tar

  run-pipeline:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install sbom-pipeline
        run: pip install -e .

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Run pipeline (local source = examples/project_inject)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_CLAIR: "true"
        run: |
          sbom-pipeline run \
            --source local \
            --path examples/project_inject \
            --output-dir $GITHUB_WORKSPACE/secgensbom_out \
            --reports-dir $GITHUB_WORKSPACE/secgensbom_reports

      - name: Upload SBOM artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-artifacts
          path: |
            secgensbom_out/*.json
            secgensbom_out/trivy/
            secgensbom_out/dependency-check/
            secgensbom_out/clair/
          expire_in: 1 week

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-reports
          path: secgensbom_reports/
          expire_in: 1 week
