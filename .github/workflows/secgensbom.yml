name: SecGenSBOM

# Запуск пайплайна на каждый push в main или вручную
on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  run-pipeline:
    name: Run SBOM pipeline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install secsbom-pipeline
        run: pip install -e .

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Run pipeline
        env:
          SKIP_CLAIR: "true"
        run: |
          secsbom-pipeline run \
            --source local \
            --path examples/project_inject \
            --output-dir $GITHUB_WORKSPACE/secgensbom_out \
            --reports-dir $GITHUB_WORKSPACE/secgensbom_reports

      - name: Upload SBOM artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-artifacts
          path: |
            secgensbom_out/*.json
            secgensbom_out/trivy/
          retention-days: 7

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-reports
          path: secgensbom_reports/
          retention-days: 7
