name: SecGenSBOM

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

env:
  IMAGE_NAME: secgensbom-sca

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry (if DOCKER_REGISTRY provided)
        if: env.DOCKER_REGISTRY != '' && secrets.DOCKER_PASSWORD
        uses: docker/login-action@v2
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: |
          docker build -t $IMAGE_NAME:${{ github.sha::8 }} -f resolve/SCA.Dockerfile .

      - name: Tag & push to registry
        if: env.DOCKER_REGISTRY != '' && secrets.DOCKER_PASSWORD
        run: |
          docker tag $IMAGE_NAME:${{ github.sha::8 }} ${{ env.DOCKER_REGISTRY }}/${{ github.repository_owner }}/$IMAGE_NAME:${{ github.sha::8 }}
          docker push ${{ env.DOCKER_REGISTRY }}/${{ github.repository_owner }}/$IMAGE_NAME:${{ github.sha::8 }}

      - name: Save image as artifact when registry not configured
        if: env.DOCKER_REGISTRY == '' || !secrets.DOCKER_PASSWORD
        uses: actions/upload-artifact@v4
        with:
          name: secgensbom-sca-image
          path: |
            # save the built image as tar
            ${{ github.workspace }}/secgensbom-sca.tar
        run: |
          docker save $IMAGE_NAME:${{ github.sha::8 }} -o secgensbom-sca.tar || true

  run-pipeline:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download image artifact if present
        if: needs.build-and-push.outputs.image_saved == 'true'
        uses: actions/download-artifact@v4
        with:
          name: secgensbom-sca-image

      - name: Load image if tar exists
        if:  steps.download-artifact.conclusion == 'success' || ( !env.DOCKER_REGISTRY )
        run: |
          if [ -f secgensbom-sca.tar ]; then docker load -i secgensbom-sca.tar; fi

      - name: Run pipeline
        env:
          DOCKER_REGISTRY: ${{ env.DOCKER_REGISTRY }}
        run: |
          chmod +x secgensbom/pipeline.sh
          ./secgensbom/pipeline.sh $GITHUB_WORKSPACE
