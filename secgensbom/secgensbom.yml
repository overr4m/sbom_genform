# GitLab CI include for SecGenSBOM pipeline
# Usage in your project's .gitlab-ci.yml:
#   include:
#     - project: 'your-group/sbom_genform'
#       file: 'secgensbom/secgensbom.yml'

stages:
  - build
  - secgensbom

build_sca_image:
  stage: build
  image: docker:stable
  services:
    - docker:dind
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_REGISTRY: ""
    DOCKER_USER: ""
    DOCKER_PASSWORD: ""
  script:
    - docker build -t "secgensbom-sca:${CI_COMMIT_SHORT_SHA:-latest}" -f docker/Dockerfile.secgensbom .
    - |
      if [ -n "$DOCKER_REGISTRY" ] && [ -n "$DOCKER_USER" ]; then
        IMAGE_TAG="$DOCKER_REGISTRY/$CI_PROJECT_NAMESPACE/secgensbom-sca:${CI_COMMIT_SHORT_SHA:-latest}"
        docker tag "secgensbom-sca:${CI_COMMIT_SHORT_SHA:-latest}" "$IMAGE_TAG"
        echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin "$DOCKER_REGISTRY"
        docker push "$IMAGE_TAG"
      else
        docker save "secgensbom-sca:${CI_COMMIT_SHORT_SHA:-latest}" -o secgensbom-sca.tar
      fi
  artifacts:
    when: always
    paths:
      - secgensbom-sca.tar
    expire_in: 1 week

secgensbom_pipeline:
  stage: secgensbom
  image: python:3.12-slim
  services:
    - docker:dind
  variables:
    DOCKER_DRIVER: overlay2
    SOURCE: "local"
    GIT_URL: ""
    GIT_TOKEN: ""
    GIT_BRANCH: ""
    SKIP_CLAIR: "true"
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl git
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh
        | sh -s -- -b /usr/local/bin
    - pip install --quiet -e .
  script:
    - |
      secsbom-pipeline run \
        --source "${SOURCE:-local}" \
        ${GIT_URL:+--url "$GIT_URL"} \
        ${GIT_TOKEN:+--token "$GIT_TOKEN"} \
        ${GIT_BRANCH:+--branch "$GIT_BRANCH"} \
        --output-dir "$CI_PROJECT_DIR/secgensbom_out" \
        --reports-dir "$CI_PROJECT_DIR/secgensbom_reports"
  artifacts:
    when: always
    paths:
      - secgensbom_out/*.json
      - secgensbom_out/trivy/
      - secgensbom_out/dependency-check/
      - secgensbom_out/clair/
      - secgensbom_reports/
    expire_in: 1 week
