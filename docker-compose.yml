services:

  # ── Clair v4: database ─────────────────────────────────────────────────────
  clair-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: clair
      POSTGRES_PASSWORD: clair
      POSTGRES_DB: clair
    # Tuned for Clair's write-heavy initial updater load and query patterns.
    # synchronous_commit=off makes updater bulk-writes ~3–5× faster at the
    # cost of losing at most ~200 ms of committed data on a hard crash —
    # acceptable for a vulnerability DB that's always re-fetchable.
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=512MB
      -c max_connections=50
      -c synchronous_commit=off
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
    volumes:
      - clair-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clair"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Clair v4: vulnerability server ─────────────────────────────────────────
  clair:
    # v4.9.0 ships claircore v1.5.48 which has a confirmed bug in
    # RemoteFetchArena (openat fetcher.XXXXXXXX: no such file or directory).
    # The fix landed in claircore v1.5.49 (Jan 2026) and is only available
    # in the nightly build until a v4.9.1+ stable release is made.
    image: quay.io/projectquay/clair:nightly
    depends_on:
      clair-db:
        condition: service_healthy
    environment:
      CLAIR_CONF: /clair/config.yaml
      CLAIR_MODE: combo
    volumes:
      - ./docker/clair-config.yaml:/clair/config.yaml:ro
      # Mount host Docker credentials so clairctl gets authenticated Docker Hub
      # pulls (much higher rate limits than anonymous).
      - ${HOME}/.docker/config.json:/root/.docker/config.json:ro
    ports:
      - "8080:8080"   # HTTP API (clairctl connects here)
      - "8089:8089"   # introspection / healthz
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8089/readyz || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 60s

  # ── Main SBOM pipeline ─────────────────────────────────────────────────────
  secgensbom:
    build:
      context: .
      dockerfile: docker/Dockerfile.secgensbom
    depends_on:
      clair:
        condition: service_healthy
    volumes:
      - ./examples/project_inject:/app/project_inject
      - ./secgensbom_out:/app/secgensbom_out
      - ./secgensbom_reports:/app/secgensbom_reports
      - ./.dependency-check-data:/app/.dependency-check-data
      - trivy-cache:/root/.cache/trivy
      # Docker socket so the pipeline can spawn depcheck & clairctl containers
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      SOURCE: local
      PROJECT_DIR: /app/project_inject
      OUTPUT_DIR: /app/secgensbom_out
      REPORTS_DIR: /app/secgensbom_reports
      DEP_CHECK_DATA: /app/.dependency-check-data
      # Host-side paths for Docker-in-Docker volume mounts
      HOST_PROJECT_DIR: ${PWD}/examples/project_inject
      HOST_OUTPUT_DIR: ${PWD}/secgensbom_out
      HOST_DEP_REPORT_DIR: ${PWD}/secgensbom_out/dependency-check
      HOST_DEP_CHECK_DATA: ${PWD}/.dependency-check-data
      HOST_CLAIR_REPORT_DIR: ${PWD}/secgensbom_out/clair
      # NVD API key for OWASP Dependency-Check v8+ (https://nvd.nist.gov/developers/request-an-api-key)
      NVD_API_KEY: ${NVD_API_KEY:-}
      # Clair — set IMAGE_NAME to the container image you want to scan
      SKIP_CLAIR: ${SKIP_CLAIR:-true}
      BDU: ${BDU:-false}
      IMAGE_NAME: ${IMAGE_NAME:-postgres:14}
      CLAIR_ENDPOINT: http://clair:8080

volumes:
  clair-db-data:
  trivy-cache:
